name: Bug Report
description: 발생한 문제나 예기치 않은 동작을 보고합니다.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 버그가 발생했는지 간결하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 재현 단계
      description: 버그를 다시 발생시키기 위한 단계별 절차를 입력해주세요.
      placeholder: |
        1. ... 서비스 실행
        2. ... 메뉴 클릭
        3. ... 오류 메시지 발생
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 기대 결과
      description: 원래 어떻게 작동해야 했는지 설명해주세요.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: 실행 환경 정보
      description: OS, 버전, 하드웨어 사양 등 관련 정보를 적어주세요.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 오류 로그 및 스크린샷
      description: 관련 로그 파일 내용이나 캡처 화면을 첨부해주세요.
