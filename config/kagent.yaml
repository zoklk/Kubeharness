url: http://kagent-tool-server.kagent.svc.cluster.local:80/mcp

# Developer 노드에서 사용 가능한 tool
developer_tools:
  - GetResources
  - GetResourceYAML
  - DescribeResource
  - GetEvents
  - GetPodLogs
  - CheckServiceConnectivity
  - GetAvailableAPIResources
  - GetClusterConfiguration
  - GetRelease
  - ListReleases

# Runtime Verifier Phase 2에서 사용 가능한 tool
# 현재는 developer와 동일하지만 향후 분리 가능성 있음
runtime_verifier_tools:
  - GetResources
  - GetResourceYAML
  - DescribeResource
  - GetEvents
  - GetPodLogs
  - CheckServiceConnectivity
  - GetRelease
  - ListReleases