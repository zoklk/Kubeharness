# 각 노드가 사용할 프로파일 이름 매핑
node_profiles:
  developer: default
  runtime_verifier_phase2: claude-verifier

profiles:
  default:
    provider: gemini
    api_key_env: GEMINI_API_KEY
    model: gemma-4-31b-it
    temperature: 0.1
    max_tool_turns: 5
    tool_timeout: 60
    tool_result_max_chars: 3000

  claude-verifier:
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-6
    temperature: 0.1
    prompt_caching: true          # 시스템 프롬프트 캐시 활성화
    max_tokens: 8096
    max_tool_turns: 5            # tool loop 최대 턴 (병렬 호출 전략으로 2~3턴이면 충분)
    tool_timeout: 60
    tool_result_max_chars: 3000
    web_search:
      tool_type: "web_search_20260209"
      max_uses: 5                 # 한 Phase 2 실행당 최대 검색 횟수
